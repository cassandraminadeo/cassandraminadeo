<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassandra Minadeo - Cover Letter</title>

<style>
/* ---------- GLOBAL ---------- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    background-color: #f4f4f4;
    color: #222;
}

/* ---------- NAVIGATION ---------- */
.top-header {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(8px);
}

.nav-bar {
    max-width: 1200px;
    margin: auto;
}

.nav-menu {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px 0;
    margin: 0;
}

.nav-menu li {
    position: relative;
}

.nav-menu a {
    text-decoration: none;
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 6px;
    transition: background 0.3s ease, transform 0.2s ease;
}

.nav-menu a:hover {
    background-color: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
}

/* ---------- DROPDOWN ---------- */
.dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    background-color: rgba(20, 20, 20, 0.75);
    backdrop-filter: blur(5px);
    list-style: none;
    padding: 0;
    margin: 0;
    min-width: 220px;
    border-radius: 12px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.6s ease, opacity 0.6s ease;
}

.dropdown:hover .dropdown-menu {
    max-height: 500px;
    opacity: 1;
}

.dropdown-menu li a {
    padding: 12px 20px;
    display: block;
    font-size: 14px;
    transition: background-color 0.3s ease;
    border-radius: 6px;
}

.dropdown-menu li a:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

/* ---------- HEADER VIDEO ---------- */
header {
    position: relative;
    height: 300px; /* shorter, subtle header */
    overflow: hidden;
}

header video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* subtle overlay */
header::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* ---------- COVER LETTER SECTION ---------- */
.cover-letter-section {
    max-width: 800px;
    margin: -80px auto 60px auto; /* pulls section up over the video header slightly */
    background: #fff;
    padding: 50px 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.cover-letter-section h2 {
    text-align: center;
    margin-bottom: 30px;
}

.cover-letter-section p {
    line-height: 1.8;
    margin-bottom: 16px;
}

/* ---------- FOOTER ---------- */
footer {
    background: #111;
    color: #fff;
    text-align: center;
    padding: 20px;
    margin-top: 60px;
}

.social-media {
    display: flex;
    justify-content: center;
    margin-top: 10px;
}

.social-link img {
    width: 20px;
    height: 20px;
    margin: 0 5px;
}
</style>
</head>

            <li><a href="Phishing_fora_GG.html">Phishing for a Game</a></li>
            <li><a href="Original_Documents.html">Original Documents</a></li>
        </ul>
    </li>
</ul>
</nav>
</div>

<!-- HEADER VIDEO -->
<header>
<video autoplay muted loop playsinline>
    <source src="images/CoverLetterVideo.mp4" type="video/mp4">
</video>
</header>

<!-- COVER LETTER CONTENT -->
<section class="cover-letter-section">
<h2>Cover Letter</h2>
<p>Yada yada</p>
</section>

<footer>

<div class="social-media">
</div>

<!-- Smooth scrolling for anchors -->
<script>
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href')).scrollIntoView({
            behavior: 'smooth'
        });
    });
});
</script>

</body>
</html>
